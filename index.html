<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Weather Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>


  <header class="top-bar">
    <div class="brand">⛅ WeatherNow</div>
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Search city..." />
      <button id="searchBtn">Search</button>
    </div>
  </header>

  <div id="spinner" class="spinner hidden">
    <div class="spin-circle"></div>
    <p>Detecting your location…</p>
  </div>


  <main id="dashboard" class="hidden">

    <section id="currentWeather" class="current-card">
      <div class="current-left">
        <div id="weatherIcon" class="weather-icon">🌤️</div>
        <div class="current-info">
          <h1 id="cityName">--</h1>
          <p id="weatherLabel">--</p>
        </div>
      </div>
      <div class="current-right">
        <div class="stat"><span id="temp">--</span><label>Temp (°C)</label></div>
        <div class="stat"><span id="wind">--</span><label>Wind (km/h)</label></div>
        <div class="stat"><span id="humidity">--</span><label>Humidity (%)</label></div>
        <div class="stat"><span id="precipProb">--</span><label>Precip. Prob (%)</label></div>
      </div>
    </section>


    <section class="chart-section">
      <h2>24-Hour Temperature</h2>
      <canvas id="tempChart"></canvas>
    </section>


    <section class="forecast-section">
      <h2>7-Day Forecast</h2>
      <div id="forecastGrid" class="forecast-grid"></div>

 
      <div id="dayDetail" class="day-detail hidden">
        <button id="closeDetail">✕ Close</button>
        <h3 id="detailDate">--</h3>
        <div class="detail-stats">
          <div><span id="detailMax">--</span><label>Max °C</label></div>
          <div><span id="detailMin">--</span><label>Min °C</label></div>
          <div><span id="detailPrecip">--</span><label>Precip %</label></div>
          <div><span id="detailIcon">--</span><label>Condition</label></div>
        </div>
      </div>
    </section>

  </main>


  <div id="errorMsg" class="error hidden"></div>

  <script src="app.js"></script>
</body>
</html>
